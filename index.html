<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBS Production Manager V12.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { 
            background-color: #f1f5f9; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: all 0.3s ease; 
        }
        .mode-dowel { --brand-primary: #2563eb; --brand-dark: #1e293b; }
        .mode-dovetail { --brand-primary: #d97706; --brand-dark: #451a03; }
        .mode-hybrid { --brand-primary: #4f46e5; --brand-dark: #311042; }
        
        .commercial-shadow { 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03), 0 20px 25px -5px rgba(0, 0, 0, 0.05); 
        }
        .input-group label { 
            @apply block text-[11px] font-bold text-slate-500 uppercase mb-1.5 tracking-wider; 
        }
        .input-group input, .input-group select { 
            @apply border border-slate-200 rounded-lg p-2.5 w-full bg-slate-50 font-medium focus:bg-white focus:border-slate-400 focus:ring-2 focus:ring-slate-100 outline-none transition-all text-sm text-slate-800 shadow-inner; 
        }
        .arm-container { display: flex; justify-content: space-between; width: 100%; gap: 4%; }
        .arm-item { width: 48%; }
        .arm-item input { width: 100% !important; min-width: 0 !important; }
        #preview-svg { display: none; }
        .is-live #preview-svg { display: block; }
        .is-live #static-reference { display: none; }

        @media print {
            @page { size: landscape; margin: 10mm; }
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100%; }
            #print-items { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
            .item-container { border: 3px solid #000; padding: 12px; height: 46vh; page-break-inside: avoid; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow: hidden; background: #fff; }
            svg { width: 100% !important; height: 100% !important; max-height: none !important; margin: 0 !important; }
            .print-header-single { 
                width: 100%; border-bottom: 2px solid #000; padding: 6px 0; margin-bottom: 8px;
                font-size: 13px; font-weight: 900; display: flex; align-items: center; justify-content: space-between;
                background: #fff; text-transform: uppercase; white-space: nowrap;
            }
            .header-left { flex-shrink: 1; overflow: hidden; text-overflow: ellipsis; min-width: 0; padding-right: 10px; }
            .header-right { flex-shrink: 0; white-space: nowrap; }
            .hybrid-spec-tag { font-size: 10px; font-weight: 800; color: #000; text-transform: uppercase; margin-top: -4px; margin-bottom: 4px; text-align: left; width: 100%; border-bottom: 1px dashed #000; padding-bottom: 2px; }
        }
    </style>
</head>
<body id="main-body" class="p-4 lg:p-8 bg-slate-50 text-slate-800">

    <div class="max-w-7xl mx-auto no-print">
        <div class="bg-white px-8 py-5 rounded-2xl commercial-shadow flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 border border-slate-100">
            <div class="flex items-center gap-5">
                <div class="h-12 w-24 bg-slate-900 rounded-xl flex items-center justify-center text-white font-black tracking-wider text-xl">DBS</div>
                <div>
                    <h1 class="text-xl font-extrabold text-slate-900 tracking-tight leading-none">U-Shape Calculator</h1>
                    <p class="text-xs text-slate-400 mt-1.5 font-medium">Production Management Console v12.2</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div id="status-chip" class="px-3.5 py-1.5 bg-slate-100 text-slate-700 text-[10px] font-bold uppercase rounded-full tracking-widest border border-slate-200">
                    Active: Dovetail
                </div>
            </div>
        </div>

        <div id="header-bar" class="bg-slate-900 px-6 py-4 text-white flex justify-between items-center rounded-2xl commercial-shadow mb-6 border border-slate-800 transition-all">
            <h2 id="header-title" class="text-xs font-bold tracking-widest uppercase opacity-80">Dovetail Mode</h2>
            <div class="flex gap-3">
                <button onclick="window.print()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded-xl text-xs font-bold uppercase tracking-wider transition-colors shadow-sm">Print Queue</button>
                <button onclick="clearQueue()" class="bg-rose-600 hover:bg-rose-500 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider transition-colors shadow-sm">Clear All</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 xl:col-span-3 space-y-6">
                <div class="bg-white p-5 rounded-2xl border border-slate-100 commercial-shadow">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-3.5 tracking-widest border-b border-slate-100 pb-2">Construction Mode</h3>
                    <div class="bg-slate-100 p-1.5 rounded-lg border flex flex-col gap-y-1.5 mb-1 shadow-inner">
                        <div class="grid grid-cols-3 gap-1 w-full">
                            <button id="btn-dovetail" onclick="setMode('dovetail')" class="py-2 rounded-md text-[9px] font-black uppercase transition-all bg-orange-600 text-white shadow-sm text-center">Dovetail</button>
                            <button id="btn-dowel" onclick="setMode('dowel')" class="py-2 rounded-md text-[9px] font-black uppercase transition-all text-slate-500 hover:text-slate-700 text-center">Dowel</button>
                            <button id="btn-hybrid" onclick="setMode('hybrid')" class="py-2 rounded-md text-[9px] font-black uppercase transition-all text-slate-500 hover:text-slate-700 text-center">DT Frt / DWL Bk</button>
                        </div>
                        <div class="grid grid-cols-2 gap-1 w-full">
                            <button id="btn-34front" onclick="setMode('threeQuarterFront')" class="py-2 rounded-md text-[9px] font-black uppercase transition-all text-slate-500 hover:text-slate-700 text-center whitespace-nowrap">3/4" Frt DT</button>
                            <button id="btn-34dovelin" onclick="setMode('threeQuarterFrontDowelInside')" class="py-2 rounded-md text-[9px] font-black uppercase transition-all text-slate-500 hover:text-slate-700 text-center whitespace-nowrap">3/4" Frt DWL In</button>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-2xl border border-slate-100 commercial-shadow">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest border-b border-slate-100 pb-2">Specification Metrics</h3>
                    <div id="entry-form" class="flex flex-col gap-4">
                        <div class="input-group"><label>Line Label Reference</label><input type="text" id="label" placeholder="e.g. Unit 1" maxlength="10" oninput="validateInput()"></div>
                        <div class="input-group"><label>Quantity Required</label><input type="number" id="qty" placeholder="1" oninput="validateInput()"></div>
                        <div class="input-group"><label>Material Thickness (Sides/Back)</label>
                            <select id="thick" onchange="validateInput()">
                                <option value="0.500">1/2" (0.500)</option>
                                <option value="0.625">5/8" (0.625)</option>
                                <option value="0.472">12mm (0.472)</option>
                                <option value="0.750">3/4" (0.750)</option>
                            </select>
                        </div>
                        <div class="input-group"><label>Box Outer Width (W)*</label><input type="text" id="width" placeholder="0.000" oninput="validateInput()"></div>
                        <div class="input-group"><label>Box Outer Depth (D)*</label><input type="text" id="depth" placeholder="0.000" oninput="validateInput()"></div>
                        <div class="input-group"><label>Box Outer Height (H)*</label><input type="text" id="height" placeholder="0.000" oninput="validateInput()"></div>
                        
                        <div id="lip-fields-container" class="border-t border-slate-100 pt-4 flex flex-col gap-4 hidden">
                            <div class="input-group"><label>Front Left Lip Overlay*</label><input type="text" id="lipLeft" value="0.188" oninput="validateInput()"></div>
                            <div class="input-group"><label>Front Right Lip Overlay*</label><input type="text" id="lipRight" value="0.188" oninput="validateInput()"></div>
                        </div>

                        <div class="border-t border-slate-100 pt-4 flex flex-col gap-4">
                            <div id="pocket-input-container" class="input-group"><label>U-Shape Pocket Depth*</label><input type="text" id="uDepth" placeholder="0.000" oninput="validateInput()"></div>
                            <div class="arm-container">
                                <div class="arm-item input-group"><label>Left Arm W*</label><input type="text" id="lArm" placeholder="0.000" oninput="validateInput()"></div>
                                <div class="arm-item input-group"><label>Right Arm W*</label><input type="text" id="rArm" placeholder="0.000" oninput="validateInput()"></div>
                            </div>
                        </div>

                        <div class="flex flex-col gap-2 mt-2 border-t border-slate-100 pt-4">
                            <button id="add-btn" onclick="addToQueue()" class="w-full bg-slate-200 text-slate-400 font-extrabold py-3.5 rounded-xl uppercase tracking-widest text-xs transition-all cursor-not-allowed" disabled>Add to Queue</button>
                            <button onclick="resetForm()" class="w-full bg-slate-50 hover:bg-slate-100 text-slate-400 font-bold py-2 rounded-lg transition-all uppercase tracking-widest text-[9px] border border-slate-200/40">Clear Input Form</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 xl:col-span-9 space-y-6">
                <div id="preview-card" class="bg-white rounded-2xl commercial-shadow border border-slate-100 p-6 flex flex-col items-center">
                    <h3 class="w-full text-[10px] font-bold text-slate-400 uppercase mb-3.5 tracking-widest border-b border-slate-100 pb-2 text-left">Vector Blueprint Preview</h3>
                    <div id="display-frame" class="w-full h-[400px] bg-slate-50 rounded-xl flex flex-col items-center justify-center border border-dashed border-slate-200 relative overflow-hidden text-center transition-all">
                        <div id="static-reference" class="flex flex-col items-center justify-center opacity-30 grayscale">
                            <svg viewBox="0 0 500 400" width="240" height="192">
                                <path d="M 100 100 L 200 100 L 200 150 L 300 150 L 300 100 L 400 100 L 400 300 L 100 300 Z" fill="#dec19e" stroke="#000" stroke-width="2" />
                            </svg>
                            <p class="text-[10px] font-bold tracking-widest uppercase text-slate-400 mt-4">Awaiting Complete Parameters</p>
                        </div>
                        <svg id="preview-svg" viewBox="0 0 500 400" class="w-full h-auto max-h-full p-4"></svg>
                    </div>
                </div>

                <div class="bg-white rounded-2xl commercial-shadow border border-slate-100 p-6">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest border-b border-slate-100 pb-2">Active Work Order Batch Queue</h3>
                    <div id="queue-list" class="space-y-2.5 text-sm"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="print-container" class="hidden print-area"><div id="print-items"></div></div>

    <script type="module" src="app.js"></script>
</body>
</html>
